{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buy Product</title>

<style>

body {
    min-height: 100vh;
    background: linear-gradient(135deg, #cfd9df, #e2ebf0);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

.container {
    width: 90%;
    max-width: 600px;
    padding: 30px;
    background: linear-gradient(145deg, #ffffff, #dbe9ff);
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    animation: fadeUp 0.6s ease;
}

h1 {
    color: #007bff;
    margin-bottom: 15px;
    font-size: 2rem;
}

img {
    width: 250px;
    height: 50%;
    object-fit: cover;
    border-radius: 16px;
    margin-bottom: 15px;
    box-shadow: 0 8px 18px rgba(0,0,0,0.3);
    transition: transform 0.3s ease;
}

img:hover {
    transform: scale(1.05);
}

p {
    font-size: 1.2rem;
    font-weight: 600;
    color: #222;
    margin-bottom: 20px;
}

form {
    display: flex;
    flex-direction: column;
    align-items: center;
}

label {
    width: 100%;
    text-align: left;
    font-weight: 600;
    margin-top: 10px;
    color: #0056b3;
}

input[type="number"],
input[type="text"] {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 0.95rem;
    transition: all 0.3s ease;
}

input:focus {
    outline: none;
    border-color: #007bff;
    box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.2);
}

button {
    margin-top: 20px;
    padding: 12px 35px;
    font-size: 1rem;
    font-weight: 600;
    background: linear-gradient(135deg, #28a745, #1e7e34);
    color: #fff;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(40, 167, 69, 0.45);
}

button:active {
    transform: scale(0.96);
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@media (max-width: 600px) {
    img {
        width: 200px;
        height: 200px;
    }
}
input[type="text"].otp-input {
    letter-spacing: 6px;
    text-align: center;
    font-size: 1.2rem;
    font-weight: 700;
    color: #007bff;
}

.otp-box {
    margin-top: 15px;
    width: 100%;
}

</style>

</head>

<body>

{% for message in messages %}
<script>
  alert("{{ message|escapejs }}");
</script>
{% endfor %}
<div class="container">
    <h1>Buy {{ product.productname }}</h1>

    <img src="{{ product.productimageone.url }}" alt="Product Image">

    <p>Price: ₹{{ product.productprice }}</p>

   <form method="POST">
    {% csrf_token %}

    <label>Quantity</label>
    <input type="number" name="quantity" value="1" min="1" placeholder="Quantity" required>

    <label>Contact Number</label>
    <input type="text" name="number" placeholder="Contact Number" required>

    
    <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">

        <!-- SEND OTP BUTTON -->
        <button type="submit" name="action" value="send_otp"
            style="background: linear-gradient(135deg,#007bff,#0047ab);">
            Send OTP
        </button>

        <!-- VERIFY BUTTON -->
      <a href="{% url 'VerifyOrderOTP' %}">
    <button type="button"
        style="background: linear-gradient(135deg,#28a745,#1e7e34);">
        Verify & Place Order
    </button>
</a>

    </div>
</form>

</div>

</body>
</html>
