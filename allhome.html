<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* ================= RESET ================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

/* ================= BODY ================= */
body {
    min-height: 100vh;
    background: linear-gradient(135deg, #4A56E2, #5F6FFF);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    overflow: hidden;
}

/* background shapes */
body::before,
body::after {
    content: "";
    position: absolute;
    width: 500px;
    height: 500px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
}

body::before {
    top: -200px;
    left: -200px;
}

body::after {
    bottom: -200px;
    right: -200px;
}

/* ================= HERO CONTAINER ================= */
.container {
    width: 90%;
    max-width: 1100px;
    background: rgba(255,255,255,0.06);
    border-radius: 28px;
    padding: 80px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.25);
    position: relative;
    z-index: 2;
}

/* ================= HEADING ================= */
h1 {
    font-size: 3.5rem;
    font-weight: 800;
    line-height: 1.2;
    max-width: 700px;
}

h1 span {
    color: #FFD86B;
}

/* ================= SUBTEXT ================= */
.bg-text {
    margin-top: 20px;
    font-size: 1.15rem;
    max-width: 650px;
    color: rgba(255,255,255,0.85);
}

/* ================= BUTTONS ================= */
.button-group {
    margin-top: 50px;
    display: flex;
    gap: 25px;
}

a {
    padding: 16px 38px;
    border-radius: 999px;
    font-weight: 600;
    text-decoration: none;
    font-size: 1rem;
    transition: all 0.35s ease;
}

/* primary */
a:first-child {
    background: #fff;
    color: #4A56E2;
}

/* secondary */
a:last-child {
    border: 2px solid rgba(255,255,255,0.5);
    color: #fff;
}

/* hover */
a:hover {
    transform: translateY(-4px);
    box-shadow: 0 18px 40px rgba(0,0,0,0.25);
}

/* ================= RESPONSIVE ================= */
@media (max-width: 768px) {
    .container {
        padding: 50px 35px;
    }

    h1 {
        font-size: 2.6rem;
    }

    .button-group {
        flex-direction: column;
        width: fit-content;
    }
}
/* ================= HERO LAYOUT ================= */
.hero {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 60px;
}

/* LEFT */
.hero-text {
    max-width: 520px;
}

.hero-text h1 {
    font-size: 3.4rem;
    font-weight: 800;
    line-height: 1.2;
}

.hero-text h1 span {
    color: #FFD86B;
}

.bg-text {
    margin-top: 20px;
    font-size: 1.1rem;
    color: rgba(255,255,255,0.85);
}

/* RIGHT IMAGE */
.hero-image {
    max-width: 420px;
    animation: float 6s ease-in-out infinite;
}

.hero-image img {
    width: 100%;
    height: auto;
    filter: drop-shadow(0 30px 60px rgba(0,0,0,0.35));
}

/* FLOAT ANIMATION */
@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-14px); }
    100% { transform: translateY(0); }
}

/* ================= RESPONSIVE ================= */
@media (max-width: 900px) {
    .hero {
        flex-direction: column;
        text-align: center;
    }

    .hero-image {
        max-width: 320px;
    }

    .button-group {
        justify-content: center;
    }
}

</style>
</head>

<body>

{% for message in messages %}
<script>
  alert("{{ message|escapejs }}");
</script>
{% endfor %}

<div class="container">
    <h1>
        <span>Localised Merchant Delivery Management</span>
    </h1>

    <div class="bg-text">
         Designed for speed,
        scale, and simplicity.
        <b><i>To support local shops</i></b>
    </div>

    <div class="button-group">
        <a href="shopkeeper">Shop Keeper</a>
        <a href="signup">Customer</a>
    </div>
</div>

</body>
</html>
